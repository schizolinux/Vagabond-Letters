<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="45" fill="#f5f5f4" stroke="#44403c" stroke-width="4"/>

  <!-- Stylized folded letter/envelope -->
  <path d="M 25 35 L 75 35 L 75 65 L 25 65 Z" fill="#ffffff" stroke="#44403c" stroke-width="4" stroke-linejoin="round"/>

  <!-- Envelope flap -->
  <path d="M 25 35 L 50 55 L 75 35" fill="none" stroke="#44403c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wax seal -->
  <circle cx="50" cy="48" r="8" fill="#991b1b" stroke="#7f1d1d" stroke-width="2"/>

  <!-- Wax seal detail (stamp mark) -->
  <path d="M 47 48 L 50 51 L 54 46" fill="none" stroke="#fecaca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
